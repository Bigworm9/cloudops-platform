apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-platform
  namespace: cloudops-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudops-platform

  template:
    metadata:
      labels:
        app: cloudops-platform

    spec:
      containers:
      - name: cloudops-platform
        image: nginx:latest

        ports:
        - containerPort: 80